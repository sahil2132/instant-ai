version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ai-workspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai-workspace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: